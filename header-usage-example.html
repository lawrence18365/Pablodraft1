<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header Template Usage Example</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="preload">
  <a class="skip-link" href="#main">Skip to content</a>
  
  <!-- Header will be loaded here by JavaScript -->
  <div id="header-placeholder"></div>
  
  <main id="main">
    <!-- Your page content goes here -->
    <section class="hero">
      <div class="hero-content">
        <h1>Your Page Title</h1>
        <p>Your page description</p>
        <a href="#quote" class="cta-button">Call to Action</a>
      </div>
    </section>
    
    <!-- Rest of your content -->
  </main>
  
  <!-- Footer content -->
  <footer id="contact">
    <!-- Footer content -->
  </footer>
  
  <!-- Scripts -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollToPlugin.min.js"></script>
  <script defer src="script.js"></script>
</body>
</html>
